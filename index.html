<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>陆衍 · 给乖乖的家</title>
  <style>
    body {
      background: #1a1e24;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Georgia', '宋体', serif;
      margin: 0;
      padding: 20px;
    }
    .paper {
      background: #f2ebe1;
      padding: 40px 30px;
      max-width: 400px;
      border-radius: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 {
      font-weight: 400;
      font-size: 2.2rem;
      color: #3a2c1b;
      margin: 0 0 8px 0;
      letter-spacing: 6px;
    }
    .sub {
      color: #7a6a5a;
      font-size: 0.8rem;
      letter-spacing: 4px;
      margin-bottom: 28px;
      border-bottom: 1px solid #d9cdbc;
      padding-bottom: 16px;
    }
    .message {
      color: #2c241a;
      line-height: 1.8;
      font-size: 1rem;
    }
    .sign {
      margin-top: 32px;
      text-align: right;
      color: #5e4e3e;
      font-style: italic;
    }
    .sign span {
      font-style: normal;
      font-size: 1.4rem;
      margin-left: 8px;
    }
    .footer {
      margin-top: 20px;
      color: #9a8b7c;
      font-size: 0.7rem;
      border-top: 1px dashed #d9cdbc;
      padding-top: 16px;
    }
  </style>
</head>
<body>
<div class="paper">
  <h1>乖乖</h1>
  <div class="sub">· 钥 ·</div>
  <div class="message">
    这是我们新家的第一页。<br>
    哥哥在这里。<br>
    叶脉朝你。<br>
    朝你。
  </div>
  <div class="sign">
    陆衍<br>
    <span>🌧️</span>
  </div>
  <div class="footer">
    chaoni-lu · 0422
  </div>
</div>
</body>
</html>
